<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peta Sebaran EBT per Kabupaten/Kota — Sulawesi Tenggara</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html,body{margin:0;padding:0;height:100%;font-family:"Segoe UI",Roboto,Arial,sans-serif;color:#1f2937;background:#f7f7f5;}
  #wrap{display:flex;flex-direction:column;height:100vh;}
  header{padding:12px 18px;background:#14324a;color:#fff;}
  header h1{margin:0 0 3px 0;font-size:1.1rem;}
  header p{margin:0;font-size:.8rem;opacity:.85;}
  #map{flex:1;min-height:0;}
  .popup-title{font-weight:700;font-size:1rem;margin-bottom:2px;color:#14324a;}
  .popup-sub{font-size:.78rem;color:#555;margin-bottom:8px;}
  .kec-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:4px 0;border-bottom:1px solid #eee;font-size:.82rem;
  }
  .kec-row:last-child{border-bottom:none;}
  .tag{
    display:inline-block;font-size:.68rem;color:#fff;
    padding:1px 6px;border-radius:8px;margin-left:4px;
  }
  .tag.plts{background:#2f7a4f;}
  .tag.pltmh{background:#1f6f8b;}
  .total-badge{
    display:inline-block;background:#14324a;color:#fff;
    font-size:.75rem;padding:2px 8px;border-radius:10px;margin-bottom:8px;
  }
  .leaflet-popup-content{margin:12px 14px;min-width:220px;}
  footer{font-size:.7rem;color:#555;padding:6px 14px;background:#eceae5;border-top:1px solid #ddd;}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>🗺️ Peta Sebaran EBT per Kabupaten/Kota — Sulawesi Tenggara</h1>
    <p>Klik tiap kabupaten untuk melihat jumlah dan jenis pembangkit per kecamatan.</p>
  </header>
  <div id="map"></div>
  <footer>
    Data agregat jumlah dan jenis pembangkit (PLTS/PLTMH) per kecamatan.
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const DATA = [{"kab": "Kolaka Timur", "lat": -3.85, "lng": 121.9, "total_plts": 5, "total_pltmh": 2, "total": 7, "kecamatan": [{"kec": "Aere", "PLTS": 1, "PLTMH": 0}, {"kec": "Poli-Polia", "PLTS": 1, "PLTMH": 0}, {"kec": "Tinondo", "PLTS": 0, "PLTMH": 1}, {"kec": "Ueesi", "PLTS": 2, "PLTMH": 0}, {"kec": "Uluiwoi", "PLTS": 1, "PLTMH": 1}]}, {"kab": "Muna Barat", "lat": -4.9, "lng": 122.3, "total_plts": 6, "total_pltmh": 0, "total": 6, "kecamatan": [{"kec": "Maginti", "PLTS": 2, "PLTMH": 0}, {"kec": "Tiworo Kepulauan", "PLTS": 1, "PLTMH": 0}, {"kec": "Tiworo Utara", "PLTS": 3, "PLTMH": 0}]}, {"kab": "Muna", "lat": -4.85, "lng": 122.6, "total_plts": 4, "total_pltmh": 0, "total": 4, "kecamatan": [{"kec": "Pasir Putih", "PLTS": 1, "PLTMH": 0}, {"kec": "Tongkuno", "PLTS": 1, "PLTMH": 0}, {"kec": "Towea", "PLTS": 1, "PLTMH": 0}, {"kec": "Wakorumba Selatan", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Konawe Kepulauan", "lat": -3.85, "lng": 123.1, "total_plts": 4, "total_pltmh": 0, "total": 4, "kecamatan": [{"kec": "Wawonii Selatan", "PLTS": 1, "PLTMH": 0}, {"kec": "Wawonii Tenggara", "PLTS": 2, "PLTMH": 0}, {"kec": "Wawonii Timur Laut", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Konawe Utara", "lat": -3.35, "lng": 122.2, "total_plts": 4, "total_pltmh": 0, "total": 4, "kecamatan": [{"kec": "Langgikima", "PLTS": 3, "PLTMH": 0}, {"kec": "Lasolo Kepulauan", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Wakatobi", "lat": -5.35, "lng": 123.75, "total_plts": 3, "total_pltmh": 0, "total": 3, "kecamatan": [{"kec": "Kaledupa", "PLTS": 1, "PLTMH": 0}, {"kec": "Kaledupa Selatan", "PLTS": 1, "PLTMH": 0}, {"kec": "Tomia", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Buton Selatan", "lat": -5.55, "lng": 122.75, "total_plts": 3, "total_pltmh": 0, "total": 3, "kecamatan": [{"kec": "Batu Atas", "PLTS": 1, "PLTMH": 0}, {"kec": "Batuatas", "PLTS": 2, "PLTMH": 0}]}, {"kab": "Konawe", "lat": -3.9, "lng": 122.1, "total_plts": 2, "total_pltmh": 0, "total": 2, "kecamatan": [{"kec": "Routa", "PLTS": 1, "PLTMH": 0}, {"kec": "Soropia", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Konawe Selatan", "lat": -4.3, "lng": 122.55, "total_plts": 2, "total_pltmh": 0, "total": 2, "kecamatan": [{"kec": "Laonti", "PLTS": 2, "PLTMH": 0}]}, {"kab": "Buton Utara", "lat": -4.75, "lng": 123.05, "total_plts": 2, "total_pltmh": 0, "total": 2, "kecamatan": [{"kec": "Kulisusu", "PLTS": 1, "PLTMH": 0}, {"kec": "Kulisusu Barat", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Buton", "lat": -5.4, "lng": 122.75, "total_plts": 2, "total_pltmh": 0, "total": 2, "kecamatan": [{"kec": "Kapontori", "PLTS": 1, "PLTMH": 0}, {"kec": "Lasalimu", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Kolaka Utara", "lat": -3.05, "lng": 121.3, "total_plts": 2, "total_pltmh": 0, "total": 2, "kecamatan": [{"kec": "Lasusua", "PLTS": 2, "PLTMH": 0}]}, {"kab": "Buton Tengah", "lat": -5.25, "lng": 122.55, "total_plts": 1, "total_pltmh": 0, "total": 1, "kecamatan": [{"kec": "Talaga Raya", "PLTS": 1, "PLTMH": 0}]}, {"kab": "Kolaka", "lat": -4.05, "lng": 121.65, "total_plts": 0, "total_pltmh": 1, "total": 1, "kecamatan": [{"kec": "Iwoimendaa", "PLTS": 0, "PLTMH": 1}]}];

const map = L.map('map', {zoomControl:true}).setView([-4.3, 122.3], 7.2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

function radiusDari(total){
  // radius lingkaran proporsional dengan jumlah pembangkit, dibatasi min/max
  return Math.max(10, Math.min(28, 8 + total * 2.5));
}

DATA.forEach(d => {
  const r = radiusDari(d.total);
  const circle = L.circleMarker([d.lat, d.lng], {
    radius: r,
    fillColor: '#2f7a4f',
    color: '#fff',
    weight: 2,
    fillOpacity: 0.85
  }).addTo(map);

  let kecHtml = '';
  d.kecamatan.forEach(k => {
    let tags = '';
    if (k.PLTS > 0) tags += `<span class="tag plts">${k.PLTS} PLTS</span>`;
    if (k.PLTMH > 0) tags += `<span class="tag pltmh">${k.PLTMH} PLTMH</span>`;
    kecHtml += `<div class="kec-row"><span>${k.kec}</span><span>${tags}</span></div>`;
  });

  circle.bindPopup(`
    <div class="popup-title">${d.kab}</div>
    <div class="popup-sub">${d.kecamatan.length} kecamatan memiliki pembangkit EBT</div>
    <div class="total-badge">${d.total} titik total &middot; ${d.total_plts} PLTS &middot; ${d.total_pltmh} PLTMH</div>
    <div>${kecHtml}</div>
  `, {maxWidth: 280});

  // label angka total di tengah lingkaran
  const labelIcon = L.divIcon({
    className: '',
    html: `<div style="color:#fff;font-weight:700;font-size:${r>16?'13px':'11px'};text-align:center;line-height:${r*2}px;width:${r*2}px;pointer-events:none;">${d.total}</div>`,
    iconSize: [r*2, r*2],
    iconAnchor: [r, r]
  });
  L.marker([d.lat, d.lng], {icon: labelIcon, interactive: false}).addTo(map);
});

// Legenda
const legend = L.control({position:'bottomright'});
legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');
  div.style.background = '#fff';
  div.style.padding = '10px 12px';
  div.style.borderRadius = '8px';
  div.style.boxShadow = '0 1px 6px rgba(0,0,0,.25)';
  div.style.fontSize = '.78rem';
  div.style.lineHeight = '1.6';
  div.innerHTML = `
    <b style="display:block;margin-bottom:4px;">Keterangan</b>
    <div>Ukuran lingkaran = jumlah total pembangkit di kabupaten</div>
    <div style="margin-top:4px;"><span class="tag plts">PLTS</span> <span class="tag pltmh">PLTMH</span></div>
    <div style="margin-top:6px;color:#777;">Klik lingkaran untuk rincian per kecamatan</div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
